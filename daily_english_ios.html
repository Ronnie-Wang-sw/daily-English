<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="每日英文">
<title>每日英文學習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#F5F2EB;--card:#fff;--nb:#FDF6E3;--nb-bd:#C8A97E;--nb-sh:#B8956A;--nb-dash:#D4B896;--nb-hl:#FFF0CC;--nb-row:#E8D8B8;--nb-prog:#F5C842;--accent:#378ADD;--text:#1A1A1A;--text2:#5A4A3A;--text3:#9A8A7A;--green-bg:#EAF3DE;--green:#27500A;--green-bd:#97C459;--red:#E53030;--ex:#3A6A3A;--pos-bg:#E8D8B8;--pos:#7A5A3A}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Noto Sans TC',sans-serif;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:16px 16px 40px;max-width:560px;margin:0 auto}
.screen.on{display:block}

/* HOME */
.hdr{text-align:center;padding:24px 0 16px}
.hdr-ico{font-size:44px;margin-bottom:10px}
.hdr-title{font-size:22px;font-weight:700;color:var(--text)}
.hdr-sub{font-size:13px;color:var(--text3);margin-top:3px}
.pill{display:inline-block;font-size:11px;padding:3px 12px;border-radius:20px;background:#EEEDFE;color:#3C3489;font-weight:600;margin-top:6px}
.stats{display:flex;gap:10px;margin:14px 0}
.stat{flex:1;background:var(--card);border:0.5px solid #E0D8CC;border-radius:14px;padding:12px 14px}
.stat-ico{font-size:20px;margin-bottom:4px}
.stat-n{font-size:21px;font-weight:600;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:1px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tc{background:var(--card);border:1px solid #E0D8CC;border-radius:16px;padding:16px 14px;cursor:pointer;text-align:left;width:100%;touch-action:manipulation;transition:transform .12s}
.tc:active{transform:scale(0.96)}
.tc.today{border:2.5px solid var(--accent)}
.tc.done{opacity:.6}
.tc-ico{font-size:28px;margin-bottom:6px}
.tc-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.tc-cnt{font-size:11px;color:var(--text3)}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:5px}
.b-today{background:#E6F1FB;color:#0C447C}
.b-done{background:var(--green-bg);color:var(--green)}
.b-lock{background:#EEECEA;color:#AAA}

/* LEARN */
.l-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{background:var(--card);border:0.5px solid #E0D8CC;border-radius:10px;padding:10px 16px;font-size:14px;color:var(--text2);cursor:pointer;font-family:inherit;min-height:44px;font-weight:500;touch-action:manipulation;display:flex;align-items:center;gap:6px}
.back:active{opacity:.7}
.l-name{font-size:15px;font-weight:600;color:var(--text)}

/* NOTEBOOK */
.nb{background:var(--nb);border-radius:16px;border:2.5px solid var(--nb-bd);box-shadow:4px 4px 0 var(--nb-sh)}
.rings{display:flex;justify-content:space-around;padding:0 18px;margin-top:-1px}
.ring{width:18px;height:26px;border:3px solid #A0856A;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:#CBA87A;margin-top:-10px}
.nb-hd{text-align:center;padding:6px 16px 12px;border-bottom:2px dashed var(--nb-dash)}
.nb-hd-ico{font-size:24px;margin-bottom:3px}
.nb-hd-zh{font-size:18px;font-weight:700;color:#2A1A0A}
.nb-hd-en{font-size:12px;color:#8A6A4A;margin-top:2px}
.nb-ctrl{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px dashed var(--nb-dash);flex-wrap:wrap}
.cbtn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:20px;border:1.5px solid var(--nb-bd);background:#FFF8EC;color:#7A5A3A;font-size:13px;cursor:pointer;font-family:inherit;min-height:46px;font-weight:500;touch-action:manipulation;white-space:nowrap}
.cbtn:active{opacity:.7}
.cbtn.on{background:var(--nb-prog);border-color:#C8A800;color:#3A2A00}
.spd{font-size:13px;padding:9px 10px;border-radius:10px;border:1.5px solid var(--nb-bd);background:#FFF8EC;color:#5A3A1A;font-family:inherit;cursor:pointer;margin-left:auto;min-height:46px;font-weight:500}
.prog-wrap{height:4px;background:var(--nb-dash);margin:6px 14px 0;border-radius:2px;overflow:hidden}
.prog-bar{height:100%;width:0%;background:var(--nb-prog);border-radius:2px;transition:width .4s}
.nb-list{padding:4px 0}
.row{display:flex;align-items:flex-start;gap:6px;padding:13px 14px 13px 10px;border-bottom:1px solid var(--nb-row);cursor:pointer;touch-action:manipulation;min-height:62px;transition:background .12s;-webkit-user-select:none;user-select:none}
.row:active{background:#FFE8A8}
.row.on{background:var(--nb-hl)}
.arr{font-size:15px;color:var(--red);width:20px;text-align:center;flex-shrink:0;margin-top:3px;opacity:0;transition:opacity .2s}
.row.on .arr{opacity:1}
.ml{font-size:22px;flex-shrink:0;width:30px;text-align:center;margin-top:1px}
.rc{flex:1;min-width:0}
.rmain{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.rnum{color:var(--nb-bd);margin-right:2px}
.rpos{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:var(--pos-bg);color:var(--pos);margin-left:5px;font-weight:500;vertical-align:middle}
.rzh{font-size:12px;color:var(--text2);margin-top:3px}
.rex{font-size:12px;color:var(--ex);font-style:italic;margin-top:4px;line-height:1.5;display:none}
.rexzh{font-size:11px;color:#7A7A3A;margin-top:2px;line-height:1.4;display:none}
.row.on .rex,.row.on .rexzh{display:block}
.sc{font-size:20px;flex-shrink:0;width:26px;text-align:center;margin-top:2px;opacity:.3;transition:opacity .2s}
.row.on .sc{opacity:1}
.nb-foot{text-align:center;font-size:10px;color:#B8986A;padding:10px 0 6px;letter-spacing:1.5px}
.done-box{background:var(--green-bg);border:0.5px solid var(--green-bd);border-radius:14px;padding:18px;text-align:center;margin-top:14px}
.done-ico{font-size:30px;margin-bottom:6px}
.done-title{font-size:15px;font-weight:600;color:var(--green)}
.done-sub{font-size:12px;color:#3B6D11;margin-top:3px}

/* iOS hint banner */
.ios-hint{background:#fff;border:1px solid #E0D8CC;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:center}
.ios-hint-ico{font-size:28px;flex-shrink:0}
.ios-hint-txt{font-size:13px;color:#555;line-height:1.5}
.ios-hint-txt b{color:#111}
.ios-close{background:none;border:none;font-size:18px;color:#BBB;cursor:pointer;padding:4px;margin-left:auto;flex-shrink:0}
</style>
</head>
<body>

<div id="home" class="screen on">
  <div class="hdr">
    <div class="hdr-ico">📖</div>
    <div class="hdr-title">每日英文學習</div>
    <div class="hdr-sub">Daily English — 每天一主題，累積中級單字</div>
    <div class="pill">中級 Intermediate</div>
  </div>
  <div id="ios-hint" class="ios-hint">
    <div class="ios-hint-ico">📲</div>
    <div class="ios-hint-txt">想像 App 一樣使用？點 Safari 底部<b>分享</b>→<b>加入主畫面</b></div>
    <button class="ios-close" onclick="document.getElementById('ios-hint').style.display='none'">✕</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-ico">🔥</div><div class="stat-n">1 天</div><div class="stat-l">連續學習</div></div>
    <div class="stat"><div class="stat-ico">📚</div><div class="stat-n" id="s-words">0</div><div class="stat-l">已學單字</div></div>
    <div class="stat"><div class="stat-ico">✅</div><div class="stat-n" id="s-done">0/7</div><div class="stat-l">完成主題</div></div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="learn" class="screen">
  <div class="l-top">
    <button class="back" id="back">← 返回</button>
    <span id="l-ico" style="font-size:20px"></span>
    <span class="l-name" id="l-name"></span>
  </div>
  <div class="nb">
    <div class="rings" id="rings"></div>
    <div class="nb-hd">
      <div class="nb-hd-ico" id="nb-ico"></div>
      <div class="nb-hd-zh" id="nb-zh"></div>
      <div class="nb-hd-en" id="nb-en"></div>
    </div>
    <div class="nb-ctrl">
      <button class="cbtn" id="play">▶ 自動播放</button>
      <button class="cbtn" id="rst">↺ 重設</button>
      <select class="spd" id="spd">
        <option value="3000">慢速</option>
        <option value="2200" selected>正常</option>
        <option value="1400">快速</option>
      </select>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>
    <div class="nb-list" id="nb-list"></div>
    <div class="nb-foot">✦ Daily English — Intermediate ✦</div>
  </div>
  <div class="done-box" id="done-box" style="display:none">
    <div class="done-ico">🎉</div>
    <div class="done-title">今日主題完成！</div>
    <div class="done-sub">繼續選擇其他主題，或明天挑戰新主題</div>
  </div>
</div>

<script>

    {en:"Algorithm",pos:"n.",zh:"演算法",ex:"Social media platforms use algorithms to curate your feed.",exZh:"社群媒體平台使用演算法來安排你的動態消息。",ml:"🤖",sc:"📱"},
    {en:"Encrypt",pos:"v.",zh:"加密",ex:"All messages on this app are fully encrypted.",exZh:"此應用程式上的所有訊息都經過完整加密。",ml:"🔐",sc:"🛡️"},
    {en:"Bandwidth",pos:"n.",zh:"頻寬",ex:"Streaming 4K video requires a lot of bandwidth.",exZh:"串流4K影片需要大量頻寬。",ml:"📡",sc:"💻"},
    {en:"Interface",pos:"n.",zh:"介面",ex:"The new interface is more intuitive than the previous version.",exZh:"新介面比舊版更直觀。",ml:"🖥️",sc:"👆"},
    {en:"Automation",pos:"n.",zh:"自動化",ex:"Automation is replacing many repetitive jobs in manufacturing.",exZh:"自動化正在取代製造業中許多重複性工作。",ml:"⚙️",sc:"🏭"},
    {en:"Cybersecurity",pos:"n.",zh:"網路安全",ex:"Cybersecurity is a top priority for any modern business.",exZh:"網路安全是任何現代企業的首要任務。",ml:"🛡️",sc:"💻"},
    {en:"Obsolete",pos:"adj.",zh:"過時的、已淘汰的",ex:"Fax machines are becoming obsolete in the digital age.",exZh:"在數位時代，傳真機正逐漸被淘汰。",ml:"📠",sc:"🗑️"},
    {en:"Prototype",pos:"n.",zh:"原型",ex:"Engineers built a prototype before mass production.",exZh:"工程師在量產前建立了一個原型。",ml:"🔨",sc:"🧪"},
    {en:"Vulnerable",pos:"adj.",zh:"易受攻擊的；脆弱的",ex:"Outdated software makes your computer vulnerable to attacks.",exZh:"過時的軟體使你的電腦容易受到攻擊。",ml:"⚠️",sc:"🔓"},
    {en:"Subscription",pos:"n.",zh:"訂閱制",ex:"The app switched from one-time purchase to a subscription model.",exZh:"該應用程式從一次性購買改為訂閱制。",ml:"📲",sc:"💳"}
  ]},
  {id:"environment",icon:"🌿",name:"環境生態",en:"Environment & Nature",words:[
    {en:"Sustainable",pos:"adj.",zh:"永續的、可持續的",ex:"We must adopt sustainable practices to protect the planet.",exZh:"我們必須採用永續做法來保護地球。",ml:"♻️",sc:"🌍"},
    {en:"Emission",pos:"n.",zh:"排放（量）",ex:"Carbon emissions from factories contribute to global warming.",exZh:"工廠排放的碳對全球暖化有所影響。",ml:"🏭",sc:"💨"},
    {en:"Biodiversity",pos:"n.",zh:"生物多樣性",ex:"Deforestation threatens the biodiversity of tropical forests.",exZh:"砍伐森林威脅熱帶雨林的生物多樣性。",ml:"🦋",sc:"🌳"},
    {en:"Renewable",pos:"adj.",zh:"可再生的",ex:"Solar and wind are popular sources of renewable energy.",exZh:"太陽能和風能是常見的可再生能源。",ml:"☀️",sc:"💚"},
    {en:"Contaminate",pos:"v.",zh:"污染",ex:"Industrial waste contaminated the nearby river.",exZh:"工業廢料污染了附近的河流。",ml:"☣️",sc:"😟"},
    {en:"Ecosystem",pos:"n.",zh:"生態系統",ex:"Coral reefs are among the most complex ecosystems on Earth.",exZh:"珊瑚礁是地球上最複雜的生態系統之一。",ml:"🪸",sc:"🐠"},
    {en:"Drought",pos:"n.",zh:"旱災",ex:"The prolonged drought has severely affected crop production.",exZh:"長期乾旱嚴重影響了農作物的生產。",ml:"🌵",sc:"☀️"},
    {en:"Conservation",pos:"n.",zh:"保育、保護",ex:"Wildlife conservation efforts have helped many species recover.",exZh:"野生動物保育努力幫助許多物種恢復。",ml:"🐘",sc:"🌿"},
    {en:"Carbon footprint",pos:"n.",zh:"碳足跡",ex:"Flying frequently increases your personal carbon footprint.",exZh:"頻繁搭飛機會增加你的個人碳足跡。",ml:"👣",sc:"✈️"},
    {en:"Deforestation",pos:"n.",zh:"森林砍伐",ex:"Deforestation for agriculture destroys natural habitats.",exZh:"農業開墾造成的砍伐破壞了天然棲息地。",ml:"🌲",sc:"🪓"}
  ]}
];

const TODAY=new Date().getDay()%T.length;
const done=new Set();
let topic=null,active=-1,playing=false,ptimer=null;

function $(id){return document.getElementById(id)}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');window.scrollTo(0,0)}

function speak(w){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const getV=()=>{const vs=speechSynthesis.getVoices();return vs.find(v=>v.lang==='en-US'&&/samantha|zira|aria|jenny|guy/i.test(v.name))||vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))};
  const say=()=>{const v=getV();const u1=new SpeechSynthesisUtterance(w.en);u1.lang='en-US';u1.rate=0.8;if(v)u1.voice=v;const g=new SpeechSynthesisUtterance(' ');g.volume=0;const u2=new SpeechSynthesisUtterance(w.ex);u2.lang='en-US';u2.rate=0.85;if(v)u2.voice=v;speechSynthesis.speak(u1);speechSynthesis.speak(g);speechSynthesis.speak(u2)};
  if(!speechSynthesis.getVoices().length){speechSynthesis.onvoiceschanged=()=>{say();speechSynthesis.onvoiceschanged=null}}else say()
}

function buildHome(){
  const g=$('grid');g.innerHTML='';
  let tw=0,td=0;
  T.forEach((t,i)=>{
    const isT=i===TODAY,isDone=done.has(t.id);
    if(isDone){tw+=t.words.length;td++}
    const c=document.createElement('button');
    c.className='tc'+(isT?' today':'')+(isDone?' done':'');
    c.innerHTML=`<div class="tc-ico">${t.icon}</div><div class="tc-name">${t.name}</div><div class="tc-cnt">${t.words.length} 個單字</div>`
      +(isT?'<div class="badge b-today">今日主題</div>':isDone?'<div class="badge b-done">✓ 已完成</div>':`<div class="badge b-lock">第 ${i+1} 天</div>`);
    c.addEventListener('click',()=>openTopic(t));
    g.appendChild(c);
  });
  $('s-words').textContent=tw;
  $('s-done').textContent=td+'/7';
}

function openTopic(t){
  topic=t;active=-1;playing=false;
  clearTimeout(ptimer);speechSynthesis&&speechSynthesis.cancel();
  $('l-ico').textContent=t.icon;$('l-name').textContent=t.name;
  $('nb-ico').textContent=t.icon;$('nb-zh').textContent=t.name;$('nb-en').textContent=t.en;
  $('done-box').style.display='none';
  $('play').textContent='▶ 自動播放';$('play').classList.remove('on');
  $('prog').style.width='0%';
  buildRings();buildList();show('learn');
}

function buildRings(){const r=$('rings');r.innerHTML='';for(let i=0;i<10;i++)r.innerHTML+='<div class="ring"></div>'}

function buildList(){
  const l=$('nb-list');l.innerHTML='';
  topic.words.forEach((w,i)=>{
    const row=document.createElement('div');
    row.className='row';row.id='r'+i;
    row.innerHTML=`<div class="arr">➤</div><div class="ml">${w.ml}</div><div class="rc"><div class="rmain"><span class="rnum">${i+1}.</span>${w.en}<span class="rpos">${w.pos}</span></div><div class="rzh">${w.zh}</div><div class="rex">${w.ex}</div><div class="rexzh">${w.exZh}</div></div><div class="sc">${w.sc}</div>`;
    row.addEventListener('click',()=>sel(i));
    l.appendChild(row);
  });
}

function sel(i){
  document.querySelectorAll('.row').forEach(r=>r.classList.remove('on'));
  const row=$('r'+i);if(row){row.classList.add('on');row.scrollIntoView({behavior:'smooth',block:'nearest'})}
  active=i;
  $('prog').style.width=Math.round(((i+1)/topic.words.length)*100)+'%';
  speak(topic.words[i]);
}

function stopPlay(){
  playing=false;clearTimeout(ptimer);speechSynthesis&&speechSynthesis.cancel();
  $('play').textContent='▶ 自動播放';$('play').classList.remove('on');
}

function togglePlay(){
  playing=!playing;
  if(playing){$('play').textContent='⏸ 暫停';$('play').classList.add('on');pNext(active)}
  else stopPlay();
}

function pNext(from){
  if(!playing)return;
  const n=from+1;
  if(n>=topic.words.length){stopPlay();done.add(topic.id);$('done-box').style.display='block';$('done-box').scrollIntoView({behavior:'smooth',block:'nearest'});return}
  sel(n);
  ptimer=setTimeout(()=>pNext(n),parseInt($('spd').value)+1600);
}

$('back').addEventListener('click',()=>{stopPlay();show('home');buildHome()});
$('play').addEventListener('click',togglePlay);
$('rst').addEventListener('click',()=>{stopPlay();active=-1;document.querySelectorAll('.row').forEach(r=>r.classList.remove('on'));$('prog').style.width='0%';$('done-box').style.display='none'});

buildHome();
</script>
