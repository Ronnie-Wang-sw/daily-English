<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="每日英文">
<meta name="theme-color" content="#F5F2EB">
<title>每日英文學習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html,body{min-height:100%;background:#F5F2EB !important;font-family:-apple-system,'Helvetica Neue',sans-serif;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:16px 16px 40px;max-width:560px;margin:0 auto}
.screen.on{display:block}

/* HOME */
.hdr{text-align:center;padding:20px 0 14px}
.hdr-ico{font-size:44px;margin-bottom:10px}
.hdr-title{font-size:22px;font-weight:700;color:#1A1A1A}
.hdr-sub{font-size:13px;color:#9A8A7A;margin-top:3px}
.pill{display:inline-block;font-size:11px;padding:3px 12px;border-radius:20px;background:#EEEDFE;color:#3C3489;font-weight:600;margin-top:6px}
.week-banner{background:#ffffff;border:1.5px solid #378ADD;border-radius:16px;padding:14px 16px;margin:14px 0;display:flex;align-items:center;gap:12px}
.wb-ico{font-size:28px;flex-shrink:0}
.wb-txt{}
.wb-title{font-size:14px;font-weight:600;color:#1A1A1A}
.wb-sub{font-size:12px;color:#9A8A7A;margin-top:2px}
.wb-countdown{font-size:11px;color:#378ADD;margin-top:3px;font-weight:500}
.stats{display:flex;gap:10px;margin:0 0 14px}
.stat{flex:1;background:#ffffff;border:0.5px solid #E0D8CC;border-radius:14px;padding:12px 14px}
.stat-ico{font-size:18px;margin-bottom:3px}
.stat-n{font-size:20px;font-weight:600;color:#1A1A1A}
.stat-l{font-size:11px;color:#9A8A7A;margin-top:1px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tc{background:#ffffff;border:1px solid #E0D8CC;border-radius:16px;padding:16px 14px;cursor:pointer;text-align:left;width:100%;touch-action:manipulation;transition:transform .12s;-webkit-user-select:none;user-select:none}
.tc:active{transform:scale(0.96)}
.tc.today{border:2.5px solid #378ADD}
.tc.done{opacity:.6}
.tc-ico{font-size:26px;margin-bottom:6px}
.tc-name{font-size:13px;font-weight:600;color:#1A1A1A;line-height:1.3;margin-bottom:2px}
.tc-cnt{font-size:11px;color:#9A8A7A}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:5px}
.b-today{background:#E6F1FB;color:#0C447C}
.b-done{background:#EAF3DE;color:#27500A}
.b-lock{background:#EEECEA;color:#AAA}
.b-new{background:#FFF0CC;color:#8A5A00}

/* LEARN */
.l-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{background:#ffffff;border:0.5px solid #E0D8CC;border-radius:10px;padding:10px 16px;font-size:14px;color:#5A4A3A;cursor:pointer;font-family:inherit;min-height:44px;font-weight:500;touch-action:manipulation}
.back:active{opacity:.7}
.l-name{font-size:15px;font-weight:600;color:#1A1A1A}

/* NOTEBOOK */
.nb{background:#FDF6E3;border-radius:16px;border:2.5px solid #C8A97E;box-shadow:4px 4px 0 #B8956A}
.rings{display:flex;justify-content:space-around;padding:0 18px;margin-top:-1px}
.ring{width:18px;height:26px;border:3px solid #A0856A;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:#CBA87A;margin-top:-10px}
.nb-hd{text-align:center;padding:6px 16px 12px;border-bottom:2px dashed #D4B896}
.nb-hd-ico{font-size:24px;margin-bottom:3px}
.nb-hd-zh{font-size:18px;font-weight:700;color:#2A1A0A}
.nb-hd-en{font-size:12px;color:#8A6A4A;margin-top:2px}
.nb-week-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#FFF0CC;color:#8A5A00;font-weight:600;margin-top:4px}
.nb-ctrl{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px dashed #D4B896;flex-wrap:wrap}
.cbtn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:20px;border:1.5px solid #C8A97E;background:#FFF8EC;color:#7A5A3A;font-size:13px;cursor:pointer;font-family:inherit;min-height:46px;font-weight:500;touch-action:manipulation;white-space:nowrap}
.cbtn:active{opacity:.7}
.cbtn.on{background:#F5C842;border-color:#C8A800;color:#3A2A00}
.spd{font-size:13px;padding:9px 10px;border-radius:10px;border:1.5px solid #C8A97E;background:#FFF8EC;color:#5A3A1A;font-family:inherit;cursor:pointer;margin-left:auto;min-height:46px;font-weight:500}
.prog-wrap{height:4px;background:#D4B896;margin:6px 14px 0;border-radius:2px;overflow:hidden}
.prog-bar{height:100%;width:0%;background:#F5C842;border-radius:2px;transition:width .4s}
.nb-list{padding:4px 0}
.row{display:flex;align-items:flex-start;gap:6px;padding:13px 14px 13px 10px;border-bottom:1px solid #E8D8B8;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;min-height:62px;transition:background .12s}
.row:active{background:#FFE8A8}
.row.on{background:#FFF0CC}
.arr{font-size:15px;color:#E53030;width:20px;text-align:center;flex-shrink:0;margin-top:3px;opacity:0;transition:opacity .2s}
.row.on .arr{opacity:1}
.ml{font-size:22px;flex-shrink:0;width:30px;text-align:center;margin-top:1px}
.rc{flex:1;min-width:0}
.rmain{font-size:15px;font-weight:700;color:#1A1A1A;line-height:1.3}
.rnum{color:#C8A97E;margin-right:2px}
.rpos{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#E8D8B8;color:#7A5A3A;margin-left:5px;font-weight:500;vertical-align:middle}
.rzh{font-size:12px;color:#5A4A3A;margin-top:3px}
.rex{font-size:12px;color:#3A6A3A;font-style:italic;margin-top:4px;line-height:1.5;display:none}
.rexzh{font-size:11px;color:#7A7A3A;margin-top:2px;line-height:1.4;display:none}
.row.on .rex,.row.on .rexzh{display:block}
.sc{font-size:20px;flex-shrink:0;width:26px;text-align:center;margin-top:2px;opacity:.3;transition:opacity .2s}
.row.on .sc{opacity:1}
.nb-foot{text-align:center;font-size:10px;color:#B8986A;padding:10px 0 6px;letter-spacing:1.5px}
.done-box{background:#EAF3DE;border:0.5px solid #97C459;border-radius:14px;padding:18px;text-align:center;margin-top:14px}
.done-ico{font-size:30px;margin-bottom:6px}
.done-title{font-size:15px;font-weight:600;color:#27500A}
.done-sub{font-size:12px;color:#3B6D11;margin-top:3px}

/* WEEK ALL DONE */
.week-done{background:linear-gradient(135deg,#FFF8E7,#FFF0CC);border:2px solid #F5C842;border-radius:16px;padding:24px;text-align:center;margin-top:0}
.wd-ico{font-size:48px;margin-bottom:10px}
.wd-title{font-size:18px;font-weight:700;color:#3A2A00;margin-bottom:6px}
.wd-sub{font-size:13px;color:#7A5A00;line-height:1.6}
.wd-countdown{font-size:12px;color:#378ADD;margin-top:10px;font-weight:600;padding:8px 14px;background:#E6F1FB;border-radius:10px;display:inline-block}

/* ── CALENDAR ── */
.cal-section{background:#ffffff;border:0.5px solid #E0D8CC;border-radius:16px;padding:16px;margin:0 0 14px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:600;color:#1A1A1A}
.cal-nav{background:none;border:0.5px solid #E0D8CC;border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer;color:#5A4A3A;min-height:36px;touch-action:manipulation}
.cal-nav:active{opacity:.7}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:600;color:#9A8A7A;text-align:center;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:none;background:transparent;touch-action:manipulation;position:relative;min-height:36px}
.cal-day:active{opacity:.7}
.cal-day .d-num{font-size:12px;font-weight:500;color:#1A1A1A;line-height:1}
.cal-day .d-ico{font-size:10px;line-height:1;margin-top:1px}
.cal-day.empty{cursor:default}
.cal-day.today-cell{background:#E6F1FB}
.cal-day.today-cell .d-num{color:#378ADD;font-weight:700}
.cal-day.selected-cell{background:#378ADD}
.cal-day.selected-cell .d-num{color:#fff;font-weight:700}
.cal-day.selected-cell .d-ico{filter:brightness(10)}
.cal-day.has-topic{background:#FFF8EC}
.cal-day.done-cell{background:#EAF3DE}
.cal-day.done-cell .d-num{color:#27500A}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#9A8A7A}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
</style>
</head>
<body style="background:#F5F2EB;font-family:-apple-system,Helvetica Neue,sans-serif;margin:0;padding:0">

<div id="home" class="screen on">
  <div class="hdr">
    <div class="hdr-ico">📖</div>
    <div class="hdr-title">每日英文學習</div>
    <div class="hdr-sub">Daily English — 每週自動更新新主題</div>
    <div class="pill">中級 Intermediate · 自動更新</div>
  </div>
  <div class="week-banner">
    <div class="wb-ico">🗓️</div>
    <div class="wb-txt">
      <div class="wb-title" id="week-title">第 1 週課程</div>
      <div class="wb-sub" id="week-sub">本週 7 個主題，每天學一個</div>
      <div class="wb-countdown" id="week-countdown"></div>
    </div>
  </div>
  <div class="cal-section">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">&#8249;</button>
      <div class="cal-title" id="cal-month-title"></div>
      <button class="cal-nav" id="cal-next">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <div class="leg"><div class="leg-dot" style="background:#E6F1FB"></div>今天</div>
      <div class="leg"><div class="leg-dot" style="background:#FFF8EC"></div>有課程</div>
      <div class="leg"><div class="leg-dot" style="background:#EAF3DE"></div>已完成</div>
      <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>已選取</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-ico">🔥</div><div class="stat-n" id="s-streak">1</div><div class="stat-l">連續天數</div></div>
    <div class="stat"><div class="stat-ico">📚</div><div class="stat-n" id="s-words">0</div><div class="stat-l">已學單字</div></div>
    <div class="stat"><div class="stat-ico">✅</div><div class="stat-n" id="s-done">0/7</div><div class="stat-l">本週完成</div></div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="learn" class="screen">
  <div class="l-top">
    <button class="back" id="back">← 返回</button>
    <span id="l-ico" style="font-size:20px"></span>
    <span class="l-name" id="l-name"></span>
  </div>
  <div class="nb">
    <div class="rings" id="rings"></div>
    <div class="nb-hd">
      <div class="nb-hd-ico" id="nb-ico"></div>
      <div class="nb-hd-zh" id="nb-zh"></div>
      <div class="nb-hd-en" id="nb-en"></div>
      <div class="nb-week-tag" id="nb-week-tag"></div>
    </div>
    <div class="nb-ctrl">
      <button class="cbtn" id="play">▶ 自動播放</button>
      <button class="cbtn" id="rst">↺ 重設</button>
      <select class="spd" id="spd">
        <option value="3000">慢速</option>
        <option value="2200" selected>正常</option>
        <option value="1400">快速</option>
      </select>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>
    <div class="nb-list" id="nb-list"></div>
    <div class="nb-foot">✦ Daily English — Weekly Auto-Update ✦</div>
  </div>
  <div class="done-box" id="done-box" style="display:none">
    <div class="done-ico">🎉</div>
    <div class="done-title">本主題學習完成！</div>
    <div class="done-sub">繼續選擇其他主題，下週自動更新新單字！</div>
  </div>
</div>

<script>
// ── 所有週次的主題資料（4週 × 7主題，共28組，可無限循環）──
const ALL_WEEKS = [
  // ══ 第1週 ══
  [
    {id:"w1_workplace",icon:"💼",name:"職場溝通",en:"Workplace Communication",words:[

      {en:"Initiative",pos:"n.",zh:"主動性；新方案",ex:"She took the initiative to redesign the entire workflow.",exZh:"她主動重新設計了整個工作流程。",ml:"🚀",sc:"💡"},
      {en:"Delegate",pos:"v.",zh:"授權、指派",ex:"A good manager knows how to delegate tasks effectively.",exZh:"一位好的主管知道如何有效地授權。",ml:"📋",sc:"👔"},
      {en:"Consensus",pos:"n.",zh:"共識",ex:"We reached a consensus after a long discussion.",exZh:"經過長時間討論後，我們達成了共識。",ml:"🗣️",sc:"✅"},
      {en:"Proactive",pos:"adj.",zh:"積極主動的",ex:"Being proactive is a key trait for career growth.",exZh:"積極主動是職涯成長的重要特質。",ml:"⚡",sc:"🌟"},
      {en:"Accountability",pos:"n.",zh:"責任感、當責",ex:"Accountability means owning your mistakes and fixing them.",exZh:"當責意味著承擔錯誤並加以改正。",ml:"🎯",sc:"⚖️"},
      {en:"Streamline",pos:"v.",zh:"簡化、精簡",ex:"We streamlined the approval process to save time.",exZh:"我們精簡了審批流程以節省時間。",ml:"⚙️",sc:"🔧"},
      {en:"Deadline",pos:"n.",zh:"截止日期",ex:"Missing a deadline can damage your professional reputation.",exZh:"錯過截止日期會損害你的職業聲譽。",ml:"📅",sc:"⏰"},
      {en:"Constructive",pos:"adj.",zh:"有建設性的",ex:"Please give constructive feedback, not just criticism.",exZh:"請給予有建設性的意見，而不只是批評。",ml:"🔨",sc:"💬"},
      {en:"Agenda",pos:"n.",zh:"議程",ex:"Could you send me the meeting agenda in advance?",exZh:"可以提前把會議議程寄給我嗎？",ml:"📝",sc:"📊"}
    ]},
    {id:"w1_travel",icon:"🌍",name:"旅遊出行",en:"Travel & Transportation",words:[
      {en:"Itinerary",pos:"n.",zh:"行程表",ex:"Our travel itinerary includes five cities in two weeks.",exZh:"我們的行程包括兩週內走訪五個城市。",ml:"🗺️",sc:"✈️"},
      {en:"Accommodation",pos:"n.",zh:"住宿",ex:"We booked budget accommodation near the city center.",exZh:"我們在市中心附近訂了平價住宿。",ml:"🏨",sc:"🛏️"},
      {en:"Layover",pos:"n.",zh:"中途停留",ex:"We have a three-hour layover in Tokyo.",exZh:"我們在東京有三小時的中途停留。",ml:"🛫",sc:"⏳"},
      {en:"Scenic",pos:"adj.",zh:"風景優美的",ex:"The train ride offers a scenic view of the mountains.",exZh:"這段火車旅程提供了壯觀的山景。",ml:"🏔️",sc:"😍"},
      {en:"Cruise",pos:"n.",zh:"郵輪旅行",ex:"They celebrated their anniversary on a Mediterranean cruise.",exZh:"他們在地中海郵輪上慶祝週年紀念日。",ml:"🚢",sc:"🌊"},
      {en:"Vicinity",pos:"n.",zh:"附近地區",ex:"There are several great restaurants in the vicinity of our hotel.",exZh:"我們飯店附近有幾家很棒的餐廳。",ml:"📍",sc:"🗺️"},
      {en:"Turbulence",pos:"n.",zh:"亂流",ex:"Please fasten your seatbelt due to turbulence.",exZh:"由於亂流，請繫好安全帶。",ml:"✈️",sc:"😬"},

      {en:"Backpacker",pos:"n.",zh:"背包客",ex:"As a backpacker, she preferred hostels over hotels.",exZh:"身為背包客，她喜歡住青年旅館而非飯店。",ml:"🎒",sc:"🗺️"}

    {id:"w1_health",icon:"🏥",name:"健康醫療",en:"Health & Medicine",words:[

      {en:"Chronic",pos:"adj.",zh:"慢性的",ex:"Diabetes is a chronic disease that requires ongoing care.",exZh:"糖尿病是一種需要持續照護的慢性疾病。",ml:"📊",sc:"⏳"},
      {en:"Symptom",pos:"n.",zh:"症狀",ex:"Fatigue and dizziness are common symptoms of anemia.",exZh:"疲勞和頭暈是貧血的常見症狀。",ml:"🌡️",sc:"😷"},
      {en:"Prescription",pos:"n.",zh:"處方箋",ex:"You need a prescription to buy this medication.",exZh:"購買這種藥物需要處方箋。",ml:"💊",sc:"📝"},
      {en:"Immune system",pos:"n.",zh:"免疫系統",ex:"Exercise helps strengthen your immune system.",exZh:"運動有助於增強你的免疫系統。",ml:"🛡️",sc:"💪"},
      {en:"Metabolism",pos:"n.",zh:"新陳代謝",ex:"A faster metabolism helps you burn calories more quickly.",exZh:"較快的新陳代謝幫助你更快燃燒卡路里。",ml:"🔥",sc:"⚡"},

      {en:"Consultation",pos:"n.",zh:"問診；諮詢",ex:"I scheduled a consultation with a nutritionist.",exZh:"我預約了與營養師的諮詢。",ml:"📋",sc:"🩺"},
      {en:"Inflammation",pos:"n.",zh:"發炎",ex:"Inflammation in the joints causes pain and stiffness.",exZh:"關節發炎會引起疼痛和僵硬。",ml:"🔴",sc:"😣"},

    ]},
    {id:"w1_finance",icon:"💰",name:"財務理財",en:"Finance & Money",words:[

      {en:"Portfolio",pos:"n.",zh:"投資組合",ex:"Diversifying your portfolio reduces financial risk.",exZh:"多元化你的投資組合可降低財務風險。",ml:"📈",sc:"💼"},
      {en:"Inflation",pos:"n.",zh:"通貨膨脹",ex:"High inflation reduces the purchasing power of money.",exZh:"高通膨會降低貨幣的購買力。",ml:"📉",sc:"😟"},

      {en:"Liability",pos:"n.",zh:"負債",ex:"Personal loans are considered liabilities on your balance sheet.",exZh:"個人貸款在資產負債表上被視為負債。",ml:"⚖️",sc:"📋"},

// ── 計算當前週次 ──
function getWeekNumber() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  return Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
}

function getCurrentWeekData() {
  const weekNum = getWeekNumber();
  const idx = (weekNum - 1) % ALL_WEEKS.length;
  return { weekNum, weekIdx: idx, topics: ALL_WEEKS[idx] };
}

function getDaysUntilNextWeek() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon...
  const daysLeft = day === 0 ? 7 : 7 - day;
  return daysLeft;
}

const {weekNum, weekIdx, topics: TOPICS} = getCurrentWeekData();
const TODAY_IDX = new Date().getDay() % 7;
const done = new Set();
let topic = null, active = -1, playing = false, ptimer = null;

function $(id){return document.getElementById(id)}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');window.scrollTo(0,0)}

function speak(w){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const getV=()=>{const vs=speechSynthesis.getVoices();return vs.find(v=>v.lang==='en-US'&&/samantha|zira|aria|jenny|guy/i.test(v.name))||vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))};
  const say=()=>{const v=getV();const u1=new SpeechSynthesisUtterance(w.en);u1.lang='en-US';u1.rate=0.8;if(v)u1.voice=v;const g=new SpeechSynthesisUtterance(' ');g.volume=0;const u2=new SpeechSynthesisUtterance(w.ex);u2.lang='en-US';u2.rate=0.85;if(v)u2.voice=v;speechSynthesis.speak(u1);speechSynthesis.speak(g);speechSynthesis.speak(u2)};
  if(!speechSynthesis.getVoices().length){speechSynthesis.onvoiceschanged=()=>{say();speechSynthesis.onvoiceschanged=null}}else say();
}

function buildHome(){
  // Week banner
  $('week-title').textContent = `第 ${weekNum} 週課程（共 ${ALL_WEEKS.length * 7} 組主題輪播）`;
  $('week-sub').textContent = `本週第 ${weekIdx+1} 批 · 7 個主題 · 每天學一個`;
  $('week-countdown').textContent = `⏳ 距離下週更新還有 ${getDaysUntilNextWeek()} 天`;

  const g=$('grid');g.innerHTML='';
  let tw=0,td=0;
  TOPICS.forEach((t,i)=>{
    const isToday=i===TODAY_IDX, isDone=done.has(t.id);
    if(isDone){tw+=t.words.length;td++}
    const c=document.createElement('button');
    c.className='tc'+(isToday?' today':'')+(isDone?' done':'');
    const badge=isToday
      ?'<div class="badge b-today">今日主題</div>'
      :isDone
        ?'<div class="badge b-done">✓ 已完成</div>'
        :`<div class="badge b-lock">第 ${i+1} 天</div>`;
    c.innerHTML=`<div class="tc-ico">${t.icon}</div><div class="tc-name">${t.name}</div><div class="tc-cnt">${t.words.length} 個單字</div>${badge}`;
    c.addEventListener('click',()=>openTopic(t));
    g.appendChild(c);
  });
  $('s-words').textContent=tw;
  $('s-done').textContent=td+'/7';
}

function openTopic(t){
  topic=t;active=-1;playing=false;
  clearTimeout(ptimer);speechSynthesis&&speechSynthesis.cancel();
  $('l-ico').textContent=t.icon;$('l-name').textContent=t.name;
  $('nb-ico').textContent=t.icon;$('nb-zh').textContent=t.name;$('nb-en').textContent=t.en;
  $('nb-week-tag').textContent=`第 ${weekNum} 週 · 第 ${weekIdx+1} 批`;
  $('done-box').style.display='none';
  $('play').textContent='▶ 自動播放';$('play').classList.remove('on');
  $('prog').style.width='0%';
  buildRings();buildList();show('learn');
}

function buildRings(){const r=$('rings');r.innerHTML='';for(let i=0;i<10;i++)r.innerHTML+='<div class="ring"></div>'}

function buildList(){
  const l=$('nb-list');l.innerHTML='';
  topic.words.forEach((w,i)=>{
    const row=document.createElement('div');
    row.className='row';row.id='r'+i;
    row.innerHTML=`<div class="arr">➤</div><div class="ml">${w.ml}</div><div class="rc"><div class="rmain"><span class="rnum">${i+1}.</span>${w.en}<span class="rpos">${w.pos}</span></div><div class="rzh">${w.zh}</div><div class="rex">${w.ex}</div><div class="rexzh">${w.exZh}</div></div><div class="sc">${w.sc}</div>`;
    row.addEventListener('click',()=>sel(i));
    l.appendChild(row);
  });
}

function sel(i){
  document.querySelectorAll('.row').forEach(r=>r.classList.remove('on'));
  const row=$('r'+i);if(row){row.classList.add('on');row.scrollIntoView({behavior:'smooth',block:'nearest'})}
  active=i;
  $('prog').style.width=Math.round(((i+1)/topic.words.length)*100)+'%';
  speak(topic.words[i]);
}

function stopPlay(){
  playing=false;clearTimeout(ptimer);speechSynthesis&&speechSynthesis.cancel();
  $('play').textContent='▶ 自動播放';$('play').classList.remove('on');
}

function togglePlay(){
  playing=!playing;
  if(playing){$('play').textContent='⏸ 暫停';$('play').classList.add('on');pNext(active)}
  else stopPlay();
}

function pNext(from){
  if(!playing)return;
  const n=from+1;
  if(n>=topic.words.length){stopPlay();done.add(topic.id);$('done-box').style.display='block';$('done-box').scrollIntoView({behavior:'smooth',block:'nearest'});
// ── CALENDAR ──
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = null;

const DOW = ['日','一','二','三','四','五','六'];
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function getTopicForDate(date) {
  // Same logic: week number determines batch, day-of-week determines topic index
  const start = new Date(date.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((date - start) / 86400000 + start.getDay() + 1) / 7);
  const weekIdx = (weekNum - 1) % ALL_WEEKS.length;
  const dayIdx = date.getDay(); // 0=Sun...6=Sat
  const topicIdx = dayIdx % 7;
  return { weekNum, weekIdx, topicIdx, topic: ALL_WEEKS[weekIdx][topicIdx] };
}

function buildCalendar() {
  const now = new Date();
  $('cal-month-title').textContent = `${calYear} 年 ${MONTH_NAMES[calMonth]}`;

  const grid = $('cal-grid');
  grid.innerHTML = '';

  // Day-of-week headers
  DOW.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const isToday = now.getDate()===d && now.getMonth()===calMonth && now.getFullYear()===calYear;
    const isSelected = selectedDate && selectedDate.getDate()===d && selectedDate.getMonth()===calMonth && selectedDate.getFullYear()===calYear;
    const { topic } = getTopicForDate(date);
    const isDone = done.has(topic.id);

    const btn = document.createElement('button');
    let cls = 'cal-day';
    if (isSelected) cls += ' selected-cell';
    else if (isToday) cls += ' today-cell';
    else if (isDone) cls += ' done-cell';
    else cls += ' has-topic';
    btn.className = cls;
    btn.innerHTML = `<span class="d-num">${d}</span><span class="d-ico">${topic.icon}</span>`;
    btn.addEventListener('click', () => {
      selectedDate = date;
      buildCalendar();
      // Open that day's topic
      const info = getTopicForDate(date);
      openTopic(info.topic);
    });
    grid.appendChild(btn);
  }
}

$('cal-prev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  buildCalendar();
});
$('cal-next').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  buildCalendar();
});

buildHome();
buildCalendar();return}

  ptimer=setTimeout(()=>pNext(n),parseInt($('spd').value)+1600);
}

$('back').addEventListener('click',()=>{stopPlay();show('home');buildHome()});
$('play').addEventListener('click',togglePlay);
$('rst').addEventListener('click',()=>{stopPlay();active=-1;document.querySelectorAll('.row').forEach(r=>r.classList.remove('on'));$('prog').style.width='0%';$('done-box').style.display='none'});

buildHome();
